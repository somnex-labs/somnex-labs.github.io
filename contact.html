<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="logo-image.png" type="image/png" />
  <title>Contact — Somnex</title>
  
  <!-- Fonts -->
  <link rel="stylesheet" href="fonts/helios-extended.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="dist/styles.css" />
  
  <!-- AOS Animations -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  
  <style>
    .contact-container {
      width: min(92vw, 1200px);
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      margin-bottom: 0.5rem;
      color: var(--text-dark-bold);
      font-weight: 500;
      text-align: left;
      font-size: 1rem;
    }

    .form-group input,
    .form-group textarea {
      padding: 1rem;
      border: 2px solid var(--panel-border);
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.9);
      color: var(--text-dark);
      font-family: 'Helios Extended', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(50, 40, 35, 0.5);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--grad-4);
      box-shadow: 0 0 0 3px rgba(111, 127, 160, 0.1);
      background-color: rgba(255, 255, 255, 1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 150px;
      font-family: 'Helios Extended', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .submit-btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--grad-2), var(--grad-4));
      color: var(--text-gradient);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 12px rgba(169, 124, 141, 0.3);
      width: 100%;
    }

    .submit-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(169, 124, 141, 0.5);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .contact-info {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--panel-border);
      text-align: center;
    }

    .form-intro {
      color: #ffffff;
      margin-bottom: 1rem;
      text-decoration: none;
    }

    .contact-info h3 {
      color: #ffffff;
      margin-bottom: 1rem;
      text-align: center;
    }

    .contact-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .contact-links a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .contact-links a:hover {
      color: #f2f2f2;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Sticky Navigation -->
  <nav class="sticky-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">SOMNEX</a>
      <button class="mobile-menu-btn" data-mobile-menu-btn>☰</button>
      <div class="nav-menu" data-mobile-menu>
        <a href="index.html">Home</a>
        <a href="about_us.html">About</a>
        <a href="vision.html">Vision</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="page-content">
    <header class="page-header" data-aos="fade-in">
      <h1>Contact</h1>
    </header>

    <div class="panel contact-container" data-aos="slide-up" data-aos-delay="100">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfNkTiZ5IVh-nOkhWuc-Umziam1v7t0wO0-k4fDjzpqOa2JzA/viewform?usp=publish-editor" title="Somnex Contact Form" style="width: 100%; min-height: 720px; border: 0; border-radius: 12px; background: #fff;"></iframe>

      <div class="contact-info">
        <h3>Other Ways to Reach Us</h3>
        <div class="contact-links">
          <a href="mailto:contact@somnex.com">contact@somnex.com</a>
          <a href="#">Twitter</a>
          <a href="#">LinkedIn</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer-nav">
    <div class="footer-column" data-aos="fade-up" data-aos-delay="0">
      <h4>The Team</h4>
      <ul>
        <li><a href="our-team.html">Our Team</a></li>
        <li><a href="governance.html">Governance</a></li>
      </ul>
    </div>
    <div class="footer-column" data-aos="fade-up" data-aos-delay="100">
      <h4>Resources</h4>
      <ul>
        <li><a href="documentation.html">Documentation</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="releases.html">Releases</a></li>
      </ul>
    </div>
    <div class="footer-column" data-aos="fade-up" data-aos-delay="200">
      <h4>Careers</h4>
      <ul>
        <li><a href="join-the-team.html">Join the Team</a></li>
        <li><a href="openings.html">Openings</a></li>
      </ul>
    </div>
    <div class="footer-column" data-aos="fade-up" data-aos-delay="300">
      <h4>Legal</h4>
      <ul>
        <li><a href="privacy-policy.html">Privacy Policy</a></li>
        <li><a href="terms-of-use.html">Terms of Use</a></li>
      </ul>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    // Initialize AOS
    AOS.init({
      duration: 800,
      easing: 'ease-out-cubic',
      once: true,
      offset: 100,
    });

    // Sticky navigation visibility
    const stickyNav = document.querySelector('.sticky-nav');
    let lastScrollY = 0;
    let ticking = false;

    const updateNavVisibility = () => {
      const scrollY = window.scrollY;
      
      if (scrollY > 200) {
        stickyNav.classList.add('visible');
      } else {
        stickyNav.classList.remove('visible');
      }
      
      ticking = false;
    };

    window.addEventListener('scroll', () => {
      lastScrollY = window.scrollY;
      if (!ticking) {
        window.requestAnimationFrame(updateNavVisibility);
        ticking = true;
      }
    });

    // Mobile menu toggle
    const mobileMenuBtn = document.querySelector('[data-mobile-menu-btn]');
    const mobileMenu = document.querySelector('[data-mobile-menu]');

    if (mobileMenuBtn && mobileMenu) {
      mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
      });

      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.remove('active');
        });
      });
    }

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="logo-image.png" type="image/png" />
  <title>Contact — Somnex</title>
  
  <!-- Fonts -->
  <link rel="stylesheet" href="fonts/helios-extended.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="dist/styles.css" />
  
  <!-- AOS Animations -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  
  <style>
    .contact-container {
      max-width: 600px;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      margin-bottom: 0.5rem;
      color: var(--text-dark-bold);
      font-weight: 500;
      text-align: left;
      font-size: 1rem;
    }

    .form-group input,
    .form-group textarea {
      padding: 1rem;
      border: 2px solid var(--panel-border);
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.9);
      color: var(--text-dark);
      font-family: 'Helios Extended', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(50, 40, 35, 0.5);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--grad-4);
      box-shadow: 0 0 0 3px rgba(111, 127, 160, 0.1);
      background-color: rgba(255, 255, 255, 1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 150px;
      font-family: 'Helios Extended', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .submit-btn {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--grad-2), var(--grad-4));
      color: var(--text-gradient);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 12px rgba(169, 124, 141, 0.3);
      width: 100%;
    }

    .submit-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(169, 124, 141, 0.5);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .contact-info {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--panel-border);
      text-align: center;
    }

    .contact-info h3 {
      color: var(--text-dark-bold);
      margin-bottom: 1rem;
      text-align: center;
    }

    .contact-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .contact-links a {
      color: var(--grad-4);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .contact-links a:hover {
      color: var(--grad-2);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Sticky Navigation -->
  <nav class="sticky-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">SOMNEX</a>
      <button class="mobile-menu-btn" data-mobile-menu-btn>☰</button>
      <div class="nav-menu" data-mobile-menu>
        <a href="index.html">Home</a>
        <a href="about_us.html">About</a>
        <a href="vision.html">Vision</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="page-content">
    <header class="page-header" data-aos="fade-in">
      <h1>Contact</h1>
    </header>

    <div class="panel contact-container" data-aos="slide-up" data-aos-delay="100">
      <form class="contact-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="name">Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Your name" 
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="your@email.com" 
            required
          />
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input 
            type="text" 
            id="subject" 
            name="subject" 
            placeholder="What's this about?" 
            required
          />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea 
            id="message" 
            name="message" 
            placeholder="Tell us more..." 
            required
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <div class="contact-info">
        <h3>Other Ways to Reach Us</h3>
        <div class="contact-links">
          <a href="mailto:contact@somnex.com">contact@somnex.com</a>
          <a href="#">Twitter</a>
          <a href="#">LinkedIn</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer-nav">
    <div class="footer-column" data-aos="fade-up" data-aos-delay="0">
      <h4>The Team</h4>
      <ul>
        <li><a href="#">Executive Board</a></li>
        <li><a href="#">Board of Directors</a></li>
      </ul>
    </div>
    <div class="footer-column" data-aos="fade-up" data-aos-delay="100">
      <h4>Resources</h4>
      <ul>
        <li><a href="#">Documentation</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Releases</a></li>
      </ul>
    </div>
    <div class="footer-column" data-aos="fade-up" data-aos-delay="200">
      <h4>Careers</h4>
      <ul>
        <li><a href="#">Join the Team</a></li>
        <li><a href="#">Openings</a></li>
      </ul>
    </div>
    <div class="footer-column" data-aos="fade-up" data-aos-delay="300">
      <h4>Legal</h4>
      <ul>
        <li><a href="#">Privacy Policy</a></li>
        <li><a href="#">Terms of Use</a></li>
      </ul>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    // Initialize AOS
    AOS.init({
      duration: 800,
      easing: 'ease-out-cubic',
      once: true,
      offset: 100,
    });

    // Sticky navigation visibility
    const stickyNav = document.querySelector('.sticky-nav');
    let lastScrollY = 0;
    let ticking = false;

    const updateNavVisibility = () => {
      const scrollY = window.scrollY;
      
      if (scrollY > 200) {
        stickyNav.classList.add('visible');
      } else {
        stickyNav.classList.remove('visible');
      }
      
      ticking = false;
    };

    window.addEventListener('scroll', () => {
      lastScrollY = window.scrollY;
      if (!ticking) {
        window.requestAnimationFrame(updateNavVisibility);
        ticking = true;
      }
    });

    // Mobile menu toggle
    const mobileMenuBtn = document.querySelector('[data-mobile-menu-btn]');
    const mobileMenu = document.querySelector('[data-mobile-menu]');

    if (mobileMenuBtn && mobileMenu) {
      mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
      });

      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.remove('active');
        });
      });
    }

    // Form submission handler
    function handleSubmit(event) {
      event.preventDefault();
      
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value,
      };

      // Log form data (in production, send to backend)
      console.log('Form submitted:', formData);
      
      // Show success message
      alert('Thank you for your message! We\'ll get back to you soon.');
      
      // Reset form
      document.querySelector('.contact-form').reset();
    }
  </script>
</body>
</html>

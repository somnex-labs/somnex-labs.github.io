name: Update Blog Index

on:
  push:
    paths:
      - 'blog updates/*.html'
      - 'scripts/generate-blog-index.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate blog index
        run: python3 scripts/generate-blog-index.py
      - name: Commit updated blog index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'blog updates/posts.js'
          git diff --quiet && git diff --staged --quiet || git commit -m "Update blog index"
          git push
